<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EBookToAudio 工作台</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>EBookToAudio 工作台</h1>
          <p id="appStatus" class="status-line">正在读取配置...</p>
        </div>
        <div class="topbar-actions">
          <button id="refreshButton" type="button">刷新</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="settings-panel" aria-label="书籍与设置">
          <section class="section-block">
            <h2>导入</h2>
            <form id="uploadForm" class="upload-form">
              <input id="bookFile" type="file" accept=".epub,.txt" required />
              <button type="submit" class="primary">上传 EPUB/TXT</button>
            </form>
            <div id="bookInfo" class="book-info">尚未导入书籍。</div>
            <div class="download-grid" id="bookDownloads"></div>
          </section>

          <section class="section-block">
            <h2>流程</h2>
            <ol class="workflow-steps" aria-label="单本书处理流程">
              <li>导入</li>
              <li>清理</li>
              <li>拆章</li>
              <li>翻译</li>
              <li>转音频</li>
              <li>下载</li>
            </ol>
          </section>

          <section class="section-block">
            <h2>文本清理</h2>
            <div class="button-stack">
              <button type="button" data-clean-operation="remove_watermarks">去除文章水印</button>
              <button type="button" data-clean-operation="normalize_spacing">去除文章多余空格等字符</button>
            </div>
            <label class="check-row">
              <input type="checkbox" name="cleanOption" value="remove_repeated_noise_lines" checked />
              删除重复广告/来源行
            </label>
            <label class="check-row">
              <input type="checkbox" name="cleanOption" value="remove_decorative_characters" checked />
              删除装饰分隔线
            </label>
            <button id="applySelectedClean" type="button">应用选中的清理项</button>
            <button id="previewCleanedText" type="button">查看清理后文本</button>
            <div id="cleanResult" class="small-log"></div>
          </section>

          <section class="section-block">
            <h2>章节</h2>
            <button id="splitButton" type="button" class="primary">按章节分成多个txt</button>
          </section>

          <section class="section-block">
            <h2>翻译与语音</h2>
            <label>翻译提示词 <input id="translationPrompt" value="将文章翻译为中文" /></label>
            <label>并行段数 <input id="translationParallel" type="number" min="1" placeholder="后端默认" /></label>
            <label>上下文提示 <textarea id="translationContext" rows="3" placeholder="保留术语、风格或背景要求"></textarea></label>
            <label>音色
              <select id="ttsVoice"></select>
            </label>
            <label>转音频并行段数 <input id="ttsParallel" type="number" min="1" value="1" /></label>
            <label>语音上下文 <textarea id="ttsContext" rows="4" placeholder="旁白风格、角色语气、作品背景或通用上下文"></textarea></label>
            <label>文本来源
              <select id="ttsSource">
                <option value="translation" selected>译文章节（无译文时用原文）</option>
                <option value="chapter">原文章节</option>
              </select>
            </label>
            <label class="check-row">
              <input id="mergeAudio" type="checkbox" checked />
              生成后自动合并音频
            </label>
            <details class="advanced-settings">
              <summary>高级接口设置</summary>
              <label>翻译 Provider <input id="translationProvider" value="default" /></label>
              <label>翻译 API Key <input id="translationApiKey" type="password" autocomplete="off" /></label>
              <label>TTS Provider <input id="ttsProvider" value="mimo" /></label>
              <label>TTS API Key <input id="ttsApiKey" type="password" autocomplete="off" /></label>
              <label>TTS Base URL <input id="ttsBaseUrl" placeholder="可选" /></label>
              <label>TTS Model <input id="ttsModel" placeholder="可选" /></label>
            </details>
          </section>
        </aside>

        <section class="main-panel" aria-label="章节工作区">
          <div class="panel-heading">
            <div>
              <h2>章节工作台</h2>
              <p id="chapterSummary">导入并拆分后显示每章状态、操作和音频。</p>
            </div>
            <div class="text-preview-actions" aria-label="文本预览">
              <button type="button" data-book-preview="current">当前文本</button>
              <button type="button" data-book-preview="full">完整文本</button>
              <button type="button" data-book-preview="cleaned">清理后文本</button>
            </div>
          </div>
          <div id="chapters" class="chapter-list"></div>
        </section>

        <aside class="activity-panel" aria-label="任务与下载">
          <section class="section-block download-hub">
            <h2>下载</h2>
            <a id="bookTranslationsZip" class="button-link muted" href="#" aria-disabled="true">整本译文 ZIP</a>
            <a id="bookAudioZip" class="button-link muted" href="#" aria-disabled="true">整本音频 ZIP</a>
          </section>
          <section class="section-block task-queue">
            <h2>任务队列</h2>
            <div id="jobBoard" class="job-board"></div>
            <div id="splitJob" class="job-board"></div>
          </section>
        </aside>
      </main>
    </div>

    <dialog id="chapterDialog" class="editor-dialog">
      <form method="dialog" class="editor-shell">
        <div class="editor-head">
          <input id="editorTitle" aria-label="章节标题" />
          <div class="editor-actions">
            <button id="saveChapterButton" type="button">保存</button>
            <button type="submit">关闭</button>
          </div>
        </div>
        <textarea id="editorText" spellcheck="false"></textarea>
        <p id="editorStatus" class="status-line"></p>
      </form>
    </dialog>

    <dialog id="bookTextDialog" class="editor-dialog">
      <form method="dialog" class="editor-shell">
        <div class="editor-head">
          <input id="bookPreviewTitle" aria-label="文本预览标题" readonly />
          <div class="editor-actions">
            <button type="submit">关闭</button>
          </div>
        </div>
        <textarea id="bookPreviewText" spellcheck="false" readonly></textarea>
        <p id="bookPreviewStatus" class="status-line"></p>
      </form>
    </dialog>

    <template id="chapterActionTemplate">
      <button type="button">将文章翻译为中文</button>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
